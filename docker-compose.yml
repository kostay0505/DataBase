services:
  trilium:
    image: zadam/trilium:latest
    ports:
      - "8080:8080"
    volumes:
      - ./trilium-data:/home/node/trilium-data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - TRILIUM_URL=http://trilium:8080
      - TRILIUM_TOKEN=${TRILIUM_TOKEN}
    depends_on:
      - trilium
    restart: unless-stopped

  bot:
    build: ./bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - TRILIUM_URL=http://trilium:8080
      - TRILIUM_TOKEN=${TRILIUM_TOKEN}
    depends_on:
      - trilium
    restart: unless-stopped
