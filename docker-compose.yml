services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pigulevsky
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pigulevsky_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
